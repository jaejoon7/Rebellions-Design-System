<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebellions Brand Expression</title>
<style>
  @font-face { font-family: 'Space Mono'; src: url('fonts/SpaceMono-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; }
  @font-face { font-family: 'Space Mono'; src: url('fonts/SpaceMono-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
  @font-face { font-family: 'Space Mono'; src: url('fonts/SpaceMono-Italic.ttf') format('truetype'); font-weight: 400; font-style: italic; }
  @font-face { font-family: 'Space Mono'; src: url('fonts/SpaceMono-BoldItalic.ttf') format('truetype'); font-weight: 700; font-style: italic; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1B1F23; font-family: 'Space Mono', monospace; transition: background 0.3s; }
  body.light { background: #F6F8FA; }
  #canvas-wrap { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  #panel {
    position: fixed; top: 16px; right: 16px; width: 260px;
    background: rgba(20, 23, 26, 0.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 0.5px solid #2a2f35; border-radius: 6px;
    padding: 10px 12px 8px; max-height: calc(100vh - 32px); overflow-y: auto;
    z-index: 10; transition: all 0.2s ease;
  }
  body.light #panel { background: rgba(246, 248, 250, 0.92); border-color: #BBC4CF; }
  #panel.collapsed { width: 150px; }
  #panel.collapsed .panel-body { display: none; }
  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-thumb { background: #2a2f35; border-radius: 2px; }
  body.light #panel::-webkit-scrollbar-thumb { background: #BBC4CF; }

  .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .panel-title { font-size: 10px; color: #52F756; letter-spacing: 0.14em; font-weight: 600; }
  .toggle { background: transparent; border: none; color: #6b7480; cursor: pointer; font-size: 14px; padding: 2px 6px; font-family: inherit; }
  .toggle:hover { color: #52F756; }

  .sec { font-size: 9px; color: #3a4048; letter-spacing: 0.12em; margin: 8px 0 4px; }
  body.light .sec { color: #8a92a0; }
  .sec:first-of-type { margin-top: 4px; }

  .btn-row { display: flex; flex-wrap: wrap; gap: 4px; }
  .btn {
    font-size: 9.5px; padding: 6px 9px; border: 0.5px solid #2a2f35;
    background: transparent; color: #6b7480; border-radius: 3px;
    cursor: pointer; letter-spacing: 0.06em; font-family: inherit; transition: all 0.12s;
  }
  body.light .btn { border-color: #BBC4CF; color: #6b7480; }
  .btn:hover { border-color: #52F756; color: #52F756; background: rgba(82, 247, 86, 0.06); }
  .btn.on { border-color: #52F756; color: #52F756; background: rgba(82, 247, 86, 0.12); }

  .row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  label { font-size: 9px; color: #6b7480; letter-spacing: 0.07em; width: 70px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  input[type=range] { flex: 1; accent-color: #52F756; height: 3px; min-width: 0; -webkit-appearance: none; appearance: none; background: transparent; }
  input[type=range]::-webkit-slider-runnable-track { height: 3px; background: #2a2f35; border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #52F756; margin-top: -3.5px; cursor: pointer; }
  input[type=range]::-moz-range-track { height: 3px; background: #2a2f35; border-radius: 2px; border: none; }
  input[type=range]::-moz-range-thumb { width: 10px; height: 10px; border-radius: 50%; background: #52F756; border: none; cursor: pointer; }
  .val { font-size: 9px; color: #52F756; width: 42px; flex-shrink: 0; text-align: right; font-variant-numeric: tabular-nums; cursor: text; }
  .val-input { font-size: 9px; color: #52F756; background: rgba(82, 247, 86, 0.08); border: 0.5px solid #52F756; border-radius: 2px; width: 42px; flex-shrink: 0; text-align: right; font-variant-numeric: tabular-nums; font-family: inherit; outline: none; padding: 1px 2px; }

  .actions { display: flex; gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 0.5px solid #2a2f35; flex-wrap: wrap; }
  body.light .actions { border-top-color: #BBC4CF; }
  .actions .btn { flex: 1; padding: 7px 0; font-size: 10px; text-align: center; min-width: 60px; }
  .actions .primary { border-color: #52F756; color: #52F756; background: rgba(82, 247, 86, 0.08); }
  .actions .primary:hover { background: rgba(82, 247, 86, 0.18); }

  .hint { font-size: 8px; color: #3a4048; margin-top: 6px; letter-spacing: 0.04em; line-height: 1.3; }
  body.light .hint { color: #8a92a0; }

  #progress {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(20, 23, 26, 0.95); border: 0.5px solid #52F756;
    padding: 14px 24px; border-radius: 4px; color: #52F756;
    font-size: 11px; letter-spacing: 0.1em; font-family: inherit;
    display: none; z-index: 100;
  }
  #progress.show { display: block; }
</style>
</head>
<body>

<div id="canvas-wrap" style="height: 955px">
  <canvas id="c" style="opacity: 1; padding: 1px; margin: 0px; border-width: 0px; border-style: solid"></canvas>
</div>

<div id="panel" style="width: 276px">
  <div class="panel-head">
    <span class="panel-title" style="font-weight: 600; font-size: 11px; line-height: 1.4; font-family: &quot;Space Mono&quot;; letter-spacing: 1px">Rebellions
Brand Expression</span>
    <button class="toggle" onclick="togglePanel()" id="toggleBtn">─</button>
  </div>

  <div class="panel-body">
    <div class="sec">SCALE-UP (CHIP → TOWER)</div>
    <div class="row"><label>Scale</label><input type="range" id="scale" min="0" max="100" step="1" value="0"><span class="val" id="v-scale" style="width: 25px">0</span></div>

    <div class="sec">GRID</div>
    <div class="row"><label>Size</label><input type="range" id="gridSize" min="1" max="20" step="1" value="1"><span class="val" id="v-gridSize" style="width: 25px">1</span></div>
    <div class="row"><label>Gap</label><input type="range" id="gap" min="0" max="200" step="1" value="0"><span class="val" id="v-gap" style="width: 25px">0%</span></div>
    <div class="row"><label>Angle</label><input type="range" id="angle" min="10" max="60" step="1" value="30"><span class="val" id="v-angle" style="width: 25px">30°</span></div>
    <div class="row"><label>Zoom</label><input type="range" id="zoom" min="20" max="300" step="1" value="100"><span class="val" id="v-zoom" style="width: 25px">100%</span></div>

    <div class="sec">DIRECTION</div>
    <div class="btn-row" id="dirs">
      <button class="btn on" data-d="up">Up</button>
      <button class="btn" data-d="down">Down</button>
      <button class="btn" data-d="random">Random</button>
    </div>

    <div class="sec">MOTION</div>
    <div class="btn-row" id="motions">
      <button class="btn on" data-mo="breathe">Breathe</button>
      <button class="btn" data-mo="wave">Wave</button>
      <button class="btn" data-mo="cascade">Cascade</button>
      <button class="btn" data-mo="pulse">Pulse</button>
      <button class="btn" data-mo="static">Static</button>
    </div>

    <div class="sec">STYLE</div>
    <div class="row"><label>Variation</label><input type="range" id="variation" min="0" max="300" step="1" value="60"><span class="val" id="v-variation" style="width: 25px">60%</span></div>
    <div class="row"><label>Neon</label><input type="range" id="neon" min="0" max="15" step="0.5" value="2"><span class="val" id="v-neon" style="width: 25px">2%</span></div>
    <div class="row"><label>Speed</label><input type="range" id="speed" min="0" max="200" step="1" value="60"><span class="val" id="v-speed" style="width: 25px">60%</span></div>
    <div class="row"><label>Line wt.</label><input type="range" id="lineW" min="0" max="3" step="0.1" value="0"><span class="val" id="v-lineW" style="width: 25px">0</span></div>
    <div class="row"><label>Line op.</label><input type="range" id="opacity" min="20" max="100" step="1" value="92"><span class="val" id="v-opacity" style="width: 25px">92%</span></div>
    <div class="row"><label>Fill op.</label><input type="range" id="fillOp" min="0" max="100" step="1" value="100"><span class="val" id="v-fillOp" style="width: 25px">100%</span></div>

    <div class="sec">HEIGHT BRIGHTNESS</div>
    <div class="btn-row">
      <button class="btn" id="hbBtn" onclick="toggleHeightBrightness()">Off</button>
    </div>
    <div class="row"><label>Range</label><input type="range" id="hbRange" min="0" max="80" step="1" value="40"><span class="val" id="v-hbRange" style="width: 25px">40%</span></div>

    <div class="actions">
      <button class="btn primary" id="playBtn" onclick="togglePlay()" style="flex:2;">▶ Play</button>
      <button class="btn" onclick="reseed()">↺ Seed</button>
    </div>

    <div class="actions">
      <button class="btn primary" onclick="exportSVG()">↓ SVG</button>
      <button class="btn primary" onclick="exportPNG()">↓ PNG</button>
      <button class="btn primary" onclick="exportGIF()">↓ GIF</button>
    </div>
    <div class="hint">ANGLE shifts view from side (10°) to top-down (60°). GAP spaces cubes apart.</div>
  </div>
</div>

<div id="progress">Encoding GIF · <span id="progressPct">0</span>%</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;

const THEMES = {
  dark:  { bg: '#1B1F23', line: '#F6F8FA', neon: '#52F756' },
  light: { bg: '#F6F8FA', line: '#1B1F23', neon: '#52F756' },
};

let cosA = Math.cos(30 * Math.PI / 180);
let sinA = Math.sin(30 * Math.PI / 180);

let theme = 'dark';
let motion = 'breathe';
let direction = 'up';
let playing = false;
let time = 0;
let seed = 1234;
let neonCells = new Set();
let heightBrightnessOn = false;
let vignetteOn = false;
let zoomLevel = 1.0;
let cubeCount = null; // exact number of cubes to draw (null = full gridSize×gridSize)

function p_hash(x, y, seed) {
  let h = Math.sin(x * 12.9898 + y * 78.233 + seed * 0.1) * 43758.5453;
  return h - Math.floor(h);
}
function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerp(a, b, t) { return a + (b - a) * t; }
function grad(hash, x, y) {
  const h = hash * 4;
  const u = h < 2 ? x : y;
  const v = h < 2 ? y : x;
  return (Math.floor(h) % 2 === 0 ? u : -u) + (Math.floor(h / 2) % 2 === 0 ? v : -v);
}
function noise2D(x, y, seed) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x - xi, yf = y - yi;
  const u = fade(xf), v = fade(yf);
  const aa = p_hash(xi, yi, seed);
  const ab = p_hash(xi, yi + 1, seed);
  const ba = p_hash(xi + 1, yi, seed);
  const bb = p_hash(xi + 1, yi + 1, seed);
  const x1 = lerp(grad(aa, xf, yf), grad(ba, xf - 1, yf), u);
  const x2 = lerp(grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1), u);
  return (lerp(x1, x2, v) + 1) * 0.5;
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  // Supersample to reduce thin-line shimmer/aliasing: 2.5x on small canvases,
  // easing toward 2x on very large viewports to protect animation performance.
  let ss = Math.min(Math.max(dpr, 2.5), 3000 / Math.max(W, H, 1));
  ss = Math.max(ss, 2);
  canvas.width = Math.round(W * ss);
  canvas.height = Math.round(H * ss);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(ss, 0, 0, ss, 0, 0);
  ctx.imageSmoothingEnabled = true;
}
window.addEventListener('resize', () => { clearTimeout(window._rt); window._rt = setTimeout(resize, 100); });

function updateAngle() {
  const angleDeg = +document.getElementById('angle').value;
  const angleRad = angleDeg * Math.PI / 180;
  cosA = Math.cos(angleRad);
  sinA = Math.sin(angleRad);
}

function getParams() {
  const scale01 = +document.getElementById('scale').value / 100;
  return {
    gridSize: +document.getElementById('gridSize').value,
    gap: +document.getElementById('gap').value / 100,
    baseH: 0.12 + scale01 * 2.8,
    variation: +document.getElementById('variation').value / 100,
    speed: +document.getElementById('speed').value / 100,
    neonRatio: +document.getElementById('neon').value / 100,
    lineW: +document.getElementById('lineW').value,
    opacity: +document.getElementById('opacity').value / 100,
    fillOp: +document.getElementById('fillOp').value / 100,
    hbRange: +document.getElementById('hbRange').value / 100,
  };
}

function getCubeDir(i, j) {
  if (direction === 'up') return 1;
  if (direction === 'down') return -1;
  return p_hash(i + 0.5, j + 0.5, seed) > 0.5 ? 1 : -1;
}

function calcCubeSize(p) {
  const margin = 0.78;
  const totalH = Math.max(1, p.baseH + p.variation);
  const vertSpan = direction === 'random' ? totalH * 2 : totalH;
  const gs = p.gridSize;
  const stepFactor = 1 + p.gap;
  const footprintW = gs * stepFactor * 2 * cosA;
  const footprintH = gs * stepFactor * 2 * sinA + vertSpan;
  return Math.min((W * margin) / Math.max(footprintW, 1.5), (H * margin) / Math.max(footprintH, 1.5)) * zoomLevel;
}

function getHeight(i, j, t, p) {
  const sp = p.speed;
  let n = 0;
  if (motion === 'breathe') {
    // Slow organic breathing — large-scale noise drifting gently
    const fs = 8;
    n = noise2D(i / fs + t * sp * 0.15, j / fs + t * sp * 0.12, seed);
    n = n * 0.6 + 0.2;
  } else if (motion === 'wave') {
    // Clear directional wave sweeping diagonally
    const phase = (i * 0.4 + j * 0.15) - t * sp * 2.5;
    n = Math.sin(phase) * 0.5 + 0.5;
  } else if (motion === 'cascade') {
    // Row-by-row waterfall — each row offset in time
    const rowPhase = i * 0.7 - t * sp * 1.8;
    const colWobble = Math.sin(j * 1.2 + t * sp * 0.5) * 0.15;
    n = (Math.sin(rowPhase) * 0.5 + 0.5) * 0.85 + colWobble;
    n = Math.max(0, Math.min(1, n));
  } else if (motion === 'pulse') {
    // Radial heartbeat expanding from center
    const cx = (p.gridSize - 1) / 2, cy = (p.gridSize - 1) / 2;
    const d = Math.sqrt((i - cx) ** 2 + (j - cy) ** 2);
    const beat = Math.sin(d * 1.2 - t * sp * 3.5);
    n = Math.pow(Math.max(0, beat), 1.5);
  } else {
    // Static — frozen noise landscape
    n = noise2D(i / 5, j / 5, seed);
  }
  return Math.max(0.05, p.baseH + (n - 0.5) * 2 * p.variation);
}

function isoProject(x, y, z, s) {
  const rx = x - 1, ry = y - 1;
  return [(rx - ry) * cosA * s, (rx + ry) * sinA * s - z * s];
}

function cubeVertices(ox, oy, s, h, dir) {
  function p(x, y, z) {
    const [px, py] = isoProject(x, y, z * dir, s);
    return [ox + px, oy + py];
  }
  return {
    v000: p(0, 0, 0),
    v100: p(1, 0, 0),
    v010: p(0, 1, 0),
    v110: p(1, 1, 0),
    v001: p(0, 0, h),
    v101: p(1, 0, h),
    v011: p(0, 1, h),
    v111: p(1, 1, h),
  };
}

function drawCubeFill(v, dir, fillOp) {
  const t = THEMES[theme];
  ctx.fillStyle = t.bg;
  ctx.globalAlpha = fillOp;

  if (dir === 1) {
    ctx.beginPath();
    ctx.moveTo(v.v001[0], v.v001[1]);
    ctx.lineTo(v.v101[0], v.v101[1]);
    ctx.lineTo(v.v111[0], v.v111[1]);
    ctx.lineTo(v.v011[0], v.v011[1]);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(v.v110[0], v.v110[1]);
    ctx.lineTo(v.v100[0], v.v100[1]);
    ctx.lineTo(v.v101[0], v.v101[1]);
    ctx.lineTo(v.v111[0], v.v111[1]);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(v.v110[0], v.v110[1]);
    ctx.lineTo(v.v010[0], v.v010[1]);
    ctx.lineTo(v.v011[0], v.v011[1]);
    ctx.lineTo(v.v111[0], v.v111[1]);
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(v.v000[0], v.v000[1]);
    ctx.lineTo(v.v100[0], v.v100[1]);
    ctx.lineTo(v.v110[0], v.v110[1]);
    ctx.lineTo(v.v010[0], v.v010[1]);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(v.v100[0], v.v100[1]);
    ctx.lineTo(v.v110[0], v.v110[1]);
    ctx.lineTo(v.v111[0], v.v111[1]);
    ctx.lineTo(v.v101[0], v.v101[1]);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(v.v010[0], v.v010[1]);
    ctx.lineTo(v.v110[0], v.v110[1]);
    ctx.lineTo(v.v111[0], v.v111[1]);
    ctx.lineTo(v.v011[0], v.v011[1]);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawCubeStroke(v, dir, isNeon, p, hNorm) {
  const t = THEMES[theme];

  // ── Line colour with optional height brightness ───────────────────────────
  let strokeColor;
  if (isNeon) {
    strokeColor = t.neon;
  } else if (heightBrightnessOn) {
    const mix = 1 - p.hbRange + hNorm * p.hbRange;
    if (theme === 'dark') {
      // tall → bright (#F6F8FA), short → near bg (#1B1F23)
      const r = Math.round(27  + (246 - 27)  * mix);
      const g = Math.round(31  + (248 - 31)  * mix);
      const b = Math.round(35  + (250 - 35)  * mix);
      strokeColor = `rgb(${r},${g},${b})`;
    } else {
      // tall → dark (#1B1F23), short → near bg (#F6F8FA)
      const r = Math.round(246 + (27  - 246) * mix);
      const g = Math.round(248 + (31  - 248) * mix);
      const b = Math.round(250 + (35  - 250) * mix);
      strokeColor = `rgb(${r},${g},${b})`;
    }
  } else {
    strokeColor = t.line;
  }

  ctx.strokeStyle = strokeColor;
  ctx.globalAlpha = isNeon ? 1.0 : p.opacity;
  ctx.lineWidth = Math.max(p.lineW, 0.85); // floor keeps hairlines stable (no sub-pixel shimmer)
  ctx.lineJoin = 'miter';
  ctx.lineCap = 'butt';
  ctx.miterLimit = 6;

  if (dir === 1) {
    ctx.beginPath();
    ctx.moveTo(v.v001[0], v.v001[1]);
    ctx.lineTo(v.v101[0], v.v101[1]);
    ctx.lineTo(v.v111[0], v.v111[1]);
    ctx.lineTo(v.v011[0], v.v011[1]);
    ctx.closePath();
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(v.v110[0], v.v110[1]); ctx.lineTo(v.v100[0], v.v100[1]);
    ctx.moveTo(v.v110[0], v.v110[1]); ctx.lineTo(v.v010[0], v.v010[1]);
    ctx.moveTo(v.v110[0], v.v110[1]); ctx.lineTo(v.v111[0], v.v111[1]);
    ctx.moveTo(v.v100[0], v.v100[1]); ctx.lineTo(v.v101[0], v.v101[1]);
    ctx.moveTo(v.v010[0], v.v010[1]); ctx.lineTo(v.v011[0], v.v011[1]);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(v.v000[0], v.v000[1]);
    ctx.lineTo(v.v100[0], v.v100[1]);
    ctx.lineTo(v.v110[0], v.v110[1]);
    ctx.lineTo(v.v010[0], v.v010[1]);
    ctx.closePath();
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(v.v111[0], v.v111[1]); ctx.lineTo(v.v101[0], v.v101[1]);
    ctx.moveTo(v.v111[0], v.v111[1]); ctx.lineTo(v.v011[0], v.v011[1]);
    ctx.moveTo(v.v111[0], v.v111[1]); ctx.lineTo(v.v110[0], v.v110[1]);
    ctx.moveTo(v.v100[0], v.v100[1]); ctx.lineTo(v.v101[0], v.v101[1]);
    ctx.moveTo(v.v010[0], v.v010[1]); ctx.lineTo(v.v011[0], v.v011[1]);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function gridToScreen(i, j, step, cx, cy, mid) {
  const wx = (i - mid) * step;
  const wy = (j - mid) * step;
  return [cx + (wx - wy) * cosA, cy + (wx + wy) * sinA];
}

function reseed() {
  seed = Math.floor(Math.random() * 99999);
  rebuildNeonCells();
}

function rebuildNeonCells() {
  const p = getParams();
  const total = p.gridSize * p.gridSize;
  const count = Math.max(0, Math.round(total * p.neonRatio));
  neonCells = new Set();
  let n = 0;
  while (neonCells.size < count && n < count * 50 + 50) {
    n++;
    const i = Math.floor(p_hash(seed + n, 0, 1) * p.gridSize);
    const j = Math.floor(p_hash(0, seed + n, 1) * p.gridSize);
    neonCells.add(i + ',' + j);
  }
}

function buildCubes(p) {
  const cubeSize = calcCubeSize(p);
  const step = cubeSize * (1 + p.gap);
  const mid = (p.gridSize - 1) / 2;

  // Cells to include (row-major). cubeCount limits the total for exact-count layouts.
  const totalCells = p.gridSize * p.gridSize;
  const limit = (cubeCount != null) ? Math.max(1, Math.min(cubeCount, totalCells)) : totalCells;
  const cells = [];
  for (let n = 0; n < limit; n++) cells.push([n % p.gridSize, Math.floor(n / p.gridSize)]);

  // Static center offset from the included cells (no height) so it doesn't shift during animation
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const [i, j] of cells) {
    const [sx, sy] = gridToScreen(i, j, step, 0, 0, mid);
    const refH = p.baseH;
    const dir = getCubeDir(i, j);
    const v = cubeVertices(sx, sy, cubeSize, refH, dir);
    for (const pt of Object.values(v)) {
      if (pt[0] < minX) minX = pt[0];
      if (pt[0] > maxX) maxX = pt[0];
      if (pt[1] < minY) minY = pt[1];
      if (pt[1] > maxY) maxY = pt[1];
    }
  }
  const offsetX = W / 2 - (minX + maxX) / 2;
  const offsetY = H / 2 - (minY + maxY) / 2;

  const cubes = [];
  for (const [i, j] of cells) {
    const [sx, sy] = gridToScreen(i, j, step, 0, 0, mid);
    const h = getHeight(i, j, time, p);
    const dir = getCubeDir(i, j);
    const isNeon = neonCells.has(i + ',' + j);
    cubes.push({ i, j, sx: sx + offsetX, sy: sy + offsetY, h, dir, isNeon, order: i + j });
  }
  cubes.sort((a, b) => a.order - b.order);

  // Normalise height 0..1 across this frame for brightness mapping
  const hMax = Math.max(...cubes.map(c => c.h));
  const hMin = Math.min(...cubes.map(c => c.h));
  const hSpan = hMax - hMin || 1;
  cubes.forEach(c => { c.hNorm = (c.h - hMin) / hSpan; });

  return { cubes, cubeSize };
}

function draw() {
  const p = getParams();
  const t = THEMES[theme];
  ctx.fillStyle = t.bg;
  ctx.fillRect(0, 0, W, H);

  const { cubes, cubeSize } = buildCubes(p);
  for (const c of cubes) {
    const v = cubeVertices(c.sx, c.sy, cubeSize, c.h, c.dir);
    if (p.fillOp > 0) drawCubeFill(v, c.dir, p.fillOp);
    drawCubeStroke(v, c.dir, c.isNeon, p, c.hNorm);
  }

  // (edge fade removed)
}

let lastTime = performance.now();
function animate(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  if (playing && motion !== 'static') time += dt;
  draw();
  requestAnimationFrame(animate);
}

function togglePlay() {
  playing = !playing;
  document.getElementById('playBtn').textContent = playing ? '⏸ Pause' : '▶ Play';
}

const sliderFmts = {
  zoom: v => Math.round(v) + '%',
  scale: v => Math.round(v),
  gridSize: v => Math.round(v),
  gap: v => Math.round(v) + '%',
  angle: v => Math.round(v) + '°',
  variation: v => Math.round(v) + '%',
  neon: v => parseFloat(v).toFixed(1) + '%',
  speed: v => Math.round(v) + '%',
  lineW: v => parseFloat(v).toFixed(1),
  opacity: v => Math.round(v) + '%',
  fillOp: v => Math.round(v) + '%',
  hbRange: v => Math.round(v) + '%',
};

function toggleHeightBrightness() {
  heightBrightnessOn = !heightBrightnessOn;
  const btn = document.getElementById('hbBtn');
  btn.textContent = heightBrightnessOn ? 'On' : 'Off';
  btn.classList.toggle('on', heightBrightnessOn);
}


// ── AX Prompt Input: apply a parameter preset from parent ──────────────────
function setAxDirection(d){ direction = d; document.querySelectorAll('#dirs .btn').forEach(b => b.classList.toggle('on', b.dataset.d === d)); }
function setAxMotion(m){ motion = m; document.querySelectorAll('#motions .btn').forEach(b => b.classList.toggle('on', b.dataset.mo === m)); }
function setAxHeightBrightness(on){ if(!!on !== heightBrightnessOn) toggleHeightBrightness(); }
let _axTween = null;
function applyParams(params, animate, doReseed, doPlay){
  if(!params) return;
  if(doReseed) reseed();
  if('cubeCount' in params) cubeCount = params.cubeCount;
  if(params.direction) setAxDirection(params.direction);
  if(params.motion) setAxMotion(params.motion);
  if('heightBrightness' in params) setAxHeightBrightness(params.heightBrightness);
  const numIds = ['scale','gridSize','gap','angle','zoom','variation','neon','speed','lineW','opacity','fillOp','hbRange'];
  const targets = {};
  numIds.forEach(id => { if(id in params) targets[id] = params[id]; });
  if(doPlay){ playing = true; const pb = document.getElementById('playBtn'); if(pb) pb.textContent = '⏸ Pause'; }
  if(animate === false){ Object.entries(targets).forEach(([id,v]) => applySliderValue(id, v)); return; }
  const starts = {};
  Object.keys(targets).forEach(id => { starts[id] = +document.getElementById(id).value; });
  const dur = 680, t0 = performance.now();
  if(_axTween) cancelAnimationFrame(_axTween);
  (function step(now){
    const k = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - k, 3);
    Object.entries(targets).forEach(([id,v]) => applySliderValue(id, starts[id] + (v - starts[id]) * e));
    if(k < 1) _axTween = requestAnimationFrame(step);
  })(performance.now());
}

window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'rbln-theme') {
    theme = e.data.theme === 'light' ? 'light' : 'dark';
    document.body.classList.toggle('light', theme === 'light');
  } else if (e.data.type === 'rbln-apply-params') {
    applyParams(e.data.params, e.data.animate, e.data.reseed, e.data.play);
  }
});

document.getElementById('dirs').addEventListener('click', e => {
  if (!e.target.dataset.d) return;
  document.querySelectorAll('#dirs .btn').forEach(b => b.classList.remove('on'));
  e.target.classList.add('on');
  direction = e.target.dataset.d;
});
document.getElementById('motions').addEventListener('click', e => {
  if (!e.target.dataset.mo) return;
  document.querySelectorAll('#motions .btn').forEach(b => b.classList.remove('on'));
  e.target.classList.add('on');
  motion = e.target.dataset.mo;
});

// Strip unit suffix to get raw number
function stripUnit(s) { return parseFloat(s.replace(/[^0-9.\-]/g, '')); }

function applySliderValue(id, rawVal) {
  const el = document.getElementById(id);
  const min = +el.min, max = +el.max, step = +el.step;
  let v = Math.max(min, Math.min(max, rawVal));
  v = Math.round(v / step) * step;
  el.value = v;
  const vo = document.getElementById('v-' + id);
  vo.textContent = sliderFmts[id](v);
  if (id === 'angle') updateAngle();
  if (id === 'zoom') zoomLevel = v / 100;
  if (id === 'neon' || id === 'gridSize') rebuildNeonCells();
}

Object.entries(sliderFmts).forEach(([id, fmt]) => {
  const el = document.getElementById(id);
  const vo = document.getElementById('v-' + id);

  // Slider drag
  el.addEventListener('input', () => {
    vo.textContent = fmt(el.value);
    if (id === 'angle') updateAngle();
    if (id === 'zoom') zoomLevel = +el.value / 100;
    if (id === 'neon' || id === 'gridSize') rebuildNeonCells();
  });

  // Click on value → editable input
  vo.addEventListener('click', () => {
    const currentRaw = stripUnit(vo.textContent);
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'val-input';
    if (vo.style.width) input.style.width = vo.style.width;
    input.value = currentRaw;
    vo.replaceWith(input);
    input.focus();
    input.select();

    function commit() {
      const parsed = parseFloat(input.value);
      input.replaceWith(vo);
      if (!isNaN(parsed)) applySliderValue(id, parsed);
      else vo.textContent = fmt(el.value);
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.removeEventListener('blur', commit); input.replaceWith(vo); }
    });
  });
});

function togglePanel() {
  const panel = document.getElementById('panel');
  panel.classList.toggle('collapsed');
  document.getElementById('toggleBtn').textContent = panel.classList.contains('collapsed') ? '+' : '─';
}

function exportSVG() {
  const p = getParams();
  const { cubes, cubeSize } = buildCubes(p);
  const t = THEMES[theme];

  function fmt(pt) { return `${pt[0].toFixed(1)} ${pt[1].toFixed(1)}`; }

  let out = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">`;
  out += `<rect width="${W}" height="${H}" fill="${t.bg}"/>`;

  for (const c of cubes) {
    const v = cubeVertices(c.sx, c.sy, cubeSize, c.h, c.dir);
    let faces, edges;
    if (c.dir === 1) {
      faces = `M${fmt(v.v001)} L${fmt(v.v101)} L${fmt(v.v111)} L${fmt(v.v011)} Z `
            + `M${fmt(v.v110)} L${fmt(v.v100)} L${fmt(v.v101)} L${fmt(v.v111)} Z `
            + `M${fmt(v.v110)} L${fmt(v.v010)} L${fmt(v.v011)} L${fmt(v.v111)} Z`;
      edges = [
        `M${fmt(v.v001)} L${fmt(v.v101)} L${fmt(v.v111)} L${fmt(v.v011)} Z`,
        `M${fmt(v.v110)} L${fmt(v.v100)}`,
        `M${fmt(v.v110)} L${fmt(v.v010)}`,
        `M${fmt(v.v110)} L${fmt(v.v111)}`,
        `M${fmt(v.v100)} L${fmt(v.v101)}`,
        `M${fmt(v.v010)} L${fmt(v.v011)}`,
      ].join(' ');
    } else {
      faces = `M${fmt(v.v000)} L${fmt(v.v100)} L${fmt(v.v110)} L${fmt(v.v010)} Z `
            + `M${fmt(v.v100)} L${fmt(v.v110)} L${fmt(v.v111)} L${fmt(v.v101)} Z `
            + `M${fmt(v.v010)} L${fmt(v.v110)} L${fmt(v.v111)} L${fmt(v.v011)} Z`;
      edges = [
        `M${fmt(v.v000)} L${fmt(v.v100)} L${fmt(v.v110)} L${fmt(v.v010)} Z`,
        `M${fmt(v.v111)} L${fmt(v.v101)}`,
        `M${fmt(v.v111)} L${fmt(v.v011)}`,
        `M${fmt(v.v111)} L${fmt(v.v110)}`,
        `M${fmt(v.v100)} L${fmt(v.v101)}`,
        `M${fmt(v.v010)} L${fmt(v.v011)}`,
      ].join(' ');
    }
    if (p.fillOp > 0) {
      out += `<path d="${faces}" fill="${t.bg}" fill-opacity="${p.fillOp}" stroke="none"/>`;
    }
    const stroke = c.isNeon ? t.neon : t.line;
    const op = c.isNeon ? 1 : p.opacity;
    out += `<path d="${edges}" stroke="${stroke}" stroke-width="${p.lineW.toFixed(2)}" fill="none" stroke-linejoin="miter" stroke-linecap="butt" opacity="${op}"/>`;
  }

  out += `</svg>`;

  const blob = new Blob([out], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `rebellions_${theme}_${direction}_${motion}.svg`;
  a.click();
  URL.revokeObjectURL(url);
}

function exportPNG() {
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `rebellions_${theme}_${direction}_${motion}.png`;
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

function exportGIF() {
  if (typeof GIF === 'undefined') {
    alert('GIF library failed to load. Check network connection.');
    return;
  }

  const progressEl = document.getElementById('progress');
  const progressPct = document.getElementById('progressPct');
  progressEl.classList.add('show');

  const targetW = Math.min(1200, W);
  const targetH = Math.round(targetW * H / W);

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = targetW;
  tempCanvas.height = targetH;
  const tempCtx = tempCanvas.getContext('2d');

  const gif = new GIF({
    workers: 2,
    quality: 10,
    width: targetW,
    height: targetH,
    workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js',
  });

  const numFrames = 36;
  const duration = 3.0;
  const frameDelay = (duration * 1000) / numFrames;
  const startTime = time;
  const wasPlaying = playing;
  playing = false;

  for (let i = 0; i < numFrames; i++) {
    time = startTime + (i / numFrames) * duration;
    draw();
    tempCtx.fillStyle = THEMES[theme].bg;
    tempCtx.fillRect(0, 0, targetW, targetH);
    tempCtx.drawImage(canvas, 0, 0, targetW, targetH);
    gif.addFrame(tempCanvas, { delay: frameDelay, copy: true });
  }

  gif.on('progress', pct => { progressPct.textContent = Math.round(pct * 100); });
  gif.on('finished', blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `rebellions_${theme}_${direction}_${motion}.gif`;
    a.click();
    URL.revokeObjectURL(url);
    progressEl.classList.remove('show');
    time = startTime;
    playing = wasPlaying;
  });

  gif.render();
}

// Mouse wheel zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -5 : 5;
  const zoomEl = document.getElementById('zoom');
  const newVal = Math.max(20, Math.min(300, +zoomEl.value + delta));
  zoomEl.value = newVal;
  zoomLevel = newVal / 100;
  document.getElementById('v-zoom').textContent = Math.round(newVal) + '%';
}, { passive: false });

if (new URLSearchParams(location.search).get('hidePanel') === '1') {
  const pn = document.getElementById('panel'); if (pn) pn.style.display = 'none';
}
resize();
rebuildNeonCells();
requestAnimationFrame(animate);
</script>
